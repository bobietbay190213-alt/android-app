name: Release APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ─────────────────────────────────────────────────────────────
      # OPTIONAL: Sign APK (requires KEYSTORE secrets in repo settings)
      # To enable: Add KEYSTORE_BASE64, KEYSTORE_PASSWORD,
      # KEY_ALIAS, KEY_PASSWORD to your repository secrets.
      # ─────────────────────────────────────────────────────────────
      - name: Sign APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Get release version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Release APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModernApp-Release-${{ steps.get_version.outputs.version }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Release-Build-Logs-${{ steps.get_version.outputs.version }}
          path: app/build/reports/
          retention-days: 14
